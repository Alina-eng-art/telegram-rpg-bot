<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="menu">
  <h1>🐍 SNAKE</h1>
  <button id="startBtn">PLAY</button>

  <!-- 🏆 старый рейтинг (оставляем) -->
  <div id="leaderboard"></div>
</div>

<div class="game">
  <div class="score">
    Score: <span id="score">0</span> |
    Best: <span id="best">0</span>
  </div>

  <canvas id="game"></canvas>
</div>

<!-- 💎 НОВЫЙ КРАСИВЫЙ РЕЙТИНГ -->
<div id="ratingModal" class="modal hidden">
  <div class="modal-content">

    <div class="modal-header">
      <h2>🏆 РЕЙТИНГ</h2>
      <button id="closeRating">✖</button>
    </div>

    <div id="nameBlock">
      <p>Твоє ім'я:</p>
      <input id="playerName">
      <button id="saveName">OK</button>
    </div>

    <div id="ratingList"></div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
